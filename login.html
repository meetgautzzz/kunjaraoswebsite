<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Kunjara OS™</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;0,9..144,900;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FBE9D0;--cream-d:#F2D8B4;
  --deep:#244855;--accent:#E64833;--teal:#90AEAD;--brown:#874F41;
  --ink:#1A0F0A;--muted:#7A6355;--border:rgba(36,72,85,.14);
  --fd:'Fraunces',Georgia,serif;--fb:'DM Sans',sans-serif;
  --ease:cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px}
body{background:linear-gradient(145deg,#1A0F0A 0%,#0D2130 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:var(--fb);padding:24px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 600px 500px at 80% 20%,rgba(230,72,51,.08) 0%,transparent 55%),radial-gradient(ellipse 500px 400px at 20% 80%,rgba(144,174,173,.09) 0%,transparent 55%);pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(251,233,208,.04) 1px,transparent 1px);background-size:28px 28px;pointer-events:none;}

.auth-wrap{width:100%;max-width:420px;position:relative;z-index:1;}

.auth-logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:36px;justify-content:center;}
.auth-wm{font-family:var(--fd);font-size:20px;font-weight:700;color:var(--cream);letter-spacing:-.5px;}
.auth-wm em{font-style:normal;color:var(--teal);}

.auth-card{background:rgba(251,233,208,.05);border:1px solid rgba(251,233,208,.12);border-radius:24px;padding:40px 36px;backdrop-filter:blur(16px);}

.auth-title{font-family:var(--fd);font-size:28px;font-weight:700;color:var(--cream);letter-spacing:-.8px;margin-bottom:6px;}
.auth-sub{font-size:14px;color:rgba(251,233,208,.45);margin-bottom:32px;font-weight:300;}

/* Google OAuth button */
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;background:var(--cream);color:var(--ink);font-size:14px;font-weight:600;font-family:var(--fb);padding:13px;border-radius:12px;border:none;cursor:pointer;transition:all .22s var(--ease);margin-bottom:24px;}
.btn-google:hover{background:#fff;transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,0,0,.25);}

.divider{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.divider-line{flex:1;height:1px;background:rgba(251,233,208,.10);}
.divider-text{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:rgba(251,233,208,.3);}

.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(251,233,208,.4);margin-bottom:7px;}
.field input{width:100%;background:rgba(251,233,208,.06);border:1px solid rgba(251,233,208,.12);border-radius:11px;padding:13px 16px;font-size:15px;color:var(--cream);font-family:var(--fb);outline:none;transition:border-color .2s;}
.field input::placeholder{color:rgba(251,233,208,.25);}
.field input:focus{border-color:rgba(144,174,173,.45);}

.forgot{display:block;text-align:right;font-size:12.5px;color:rgba(251,233,208,.35);text-decoration:none;margin-top:-8px;margin-bottom:24px;transition:color .2s;}
.forgot:hover{color:var(--teal);}

.btn-submit{width:100%;background:var(--accent);color:#fff;font-size:15px;font-weight:700;font-family:var(--fd);padding:14px;border-radius:12px;border:none;cursor:pointer;transition:all .22s var(--ease);letter-spacing:.2px;}
.btn-submit:hover{background:#cc3020;transform:translateY(-1px);box-shadow:0 10px 24px rgba(230,72,51,.35);}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

.auth-footer{text-align:center;margin-top:24px;font-size:13.5px;color:rgba(251,233,208,.35);}
.auth-footer a{color:var(--teal);text-decoration:none;font-weight:600;}
.auth-footer a:hover{color:var(--cream);}

.msg{padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:16px;display:none;}
.msg.error{background:rgba(230,72,51,.12);border:1px solid rgba(230,72,51,.25);color:#ff8070;}
.msg.success{background:rgba(144,174,173,.12);border:1px solid rgba(144,174,173,.25);color:var(--teal);}
.msg.show{display:block;}

.back-home{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:28px;font-size:13px;color:rgba(251,233,208,.25);text-decoration:none;transition:color .2s;}
.back-home:hover{color:rgba(251,233,208,.5);}
</style>
</head>
<body>
<div class="auth-wrap">

  <a href="/" class="auth-logo">
    <svg width="34" height="34" viewBox="0 0 80 80" fill="none">
      <circle cx="40" cy="40" r="38" fill="#E2ECED" stroke="#244855" stroke-width="1.5" stroke-opacity=".45"/>
      <ellipse cx="36" cy="50" rx="20" ry="17" fill="#90AEAD" fill-opacity=".22" stroke="#244855" stroke-width="1.3"/>
      <ellipse cx="52" cy="34" rx="14" ry="13" fill="#90AEAD" fill-opacity=".22" stroke="#244855" stroke-width="1.3"/>
      <ellipse cx="42" cy="30" rx="8" ry="10" fill="#E8F0F0" stroke="#244855" stroke-width="1.1"/>
      <circle cx="56" cy="30" r="2.8" fill="#244855"/>
      <path d="M61 40 Q70 47 67 58 Q64 65 58 63" stroke="#244855" stroke-width="2.8" stroke-linecap="round" fill="none"/>
      <path d="M57 42 L66 50" stroke="#874F41" stroke-width="2.2" stroke-linecap="round"/>
      <path d="M51 15 L57 9 L63 15" stroke="#874F41" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="57" y1="9" x2="57" y2="22" stroke="#874F41" stroke-width="2.2" stroke-linecap="round"/>
      <rect x="20" y="62" width="8" height="11" rx="2.5" fill="#244855" opacity=".48"/>
      <rect x="30" y="63" width="8" height="10" rx="2.5" fill="#244855" opacity=".38"/>
      <rect x="40" y="63" width="8" height="10" rx="2.5" fill="#244855" opacity=".28"/>
      <rect x="50" y="62" width="8" height="11" rx="2.5" fill="#244855" opacity=".22"/>
    </svg>
    <span class="auth-wm">Kunjara <em>OS</em>™</span>
  </a>

  <div class="auth-card">
    <h1 class="auth-title">Welcome back.</h1>
    <p class="auth-sub">Log in to your event operating system.</p>

    <!-- Google OAuth -->
    <button class="btn-google" onclick="loginGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or email</span>
      <div class="divider-line"></div>
    </div>

    <div class="msg" id="msg"></div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <a href="/forgot-password" class="forgot">Forgot password?</a>

    <button class="btn-submit" id="loginBtn" onclick="loginEmail()">Log in to Kunjara OS</button>

    <div class="auth-footer">
      Don't have an account? <a href="/signup">Sign up free →</a>
    </div>
  </div>

  <a href="/" class="back-home">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    Back to kunjaraos.com
  </a>
</div>

<!-- Supabase JS v2 CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ── CONFIG ── Replace with your actual Supabase project values
const SUPABASE_URL = 'https://YOUR_PROJECT_REF.supabase.co';
const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY_HERE';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type + ' show';
}

function setLoading(loading) {
  const btn = document.getElementById('loginBtn');
  btn.disabled = loading;
  btn.textContent = loading ? 'Logging in…' : 'Log in to Kunjara OS';
}

async function loginEmail() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email || !password) { showMsg('Please enter your email and password.', 'error'); return; }
  setLoading(true);
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { showMsg(error.message, 'error'); setLoading(false); }
  else { showMsg('Logged in! Redirecting…', 'success'); setTimeout(() => window.location.href = 'https://app.kunjaraos.com/dashboard', 1200); }
}

async function loginGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://app.kunjaraos.com/dashboard' }
  });
  if (error) showMsg(error.message, 'error');
}

// Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') loginEmail(); });

// Auto-redirect if already logged in
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'https://app.kunjaraos.com/dashboard';
});
</script>
</body>
</html>
